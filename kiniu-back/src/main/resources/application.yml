spring:
  application:
    name: kiniu-ai-engineering-lab

server:
  port: 8080
  address: 127.0.0.1

game:
  security:
    local-token: ${KINIU_LOCAL_TOKEN:}
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
    allowed-provider-hosts:
      - localhost
      - 127.0.0.1
      - ::1
  story:
    catalog-path: data/story-catalog.json
  agents:
    catalog-path: data/agent-catalog.json
  learning:
    catalog-path: data/learning-catalog.json
    progress-path: data/learning-progress.json
    attempts-path: data/learning-attempts.json
  sessions:
    export-path: data/session-exports
    max-state-sessions: 3
    max-memory-sessions: 3
    max-cached-archives: 3
